<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zebra Finch AI</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b1220;
  color:#fff;
}
.nav {
  position:fixed;
  right:0;
  top:0;
  height:100%;
  width:200px;
  background:#111a2e;
  padding:10px;
}
.nav button {
  width:100%;
  padding:12px;
  margin:5px 0;
  background:none;
  border:none;
  color:#fff;
  cursor:pointer;
}
.nav button.active {
  background:#f59e0b;
}

.main {
  margin-right:210px;
  padding:20px;
}

.page {
  display:none;
}

.page.active {
  display:block;
}

.card {
  background:#1e293b;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

input, select {
  width:100%;
  padding:10px;
  margin:5px 0;
}

.btn {
  padding:10px;
  background:#f59e0b;
  border:none;
  cursor:pointer;
  margin-top:10px;
}

.result-card {
  background:#334155;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="nav">
  <button onclick="showPage('home',this)" class="active">الرئيسية</button>
  <button onclick="showPage('breeding',this)">حاسبة التزاوج</button>
</div>

<div class="main">

<!-- الصفحة الرئيسية -->
<div id="home" class="page active">
  <div class="card">
    <h2>زِبرا فينش 🐦</h2>
    <p>نظام إدارة الطيور + الذكاء الاصطناعي</p>
  </div>
</div>

<!-- حاسبة التزاوج -->
<div id="breeding" class="page">

  <div class="card">
    <h3>♂️ الذكر</h3>
    <input id="maleName" placeholder="اسم الذكر">
    <label><input type="checkbox" value="Ob" class="maleGene"> أورنج بريست</label>
    <label><input type="checkbox" value="Bb" class="maleGene"> بلاك بريست</label>
    <label><input type="checkbox" value="Bf" class="maleGene"> بلاك فيس</label>
  </div>

  <div class="card">
    <h3>♀️ الأنثى</h3>
    <input id="femaleName" placeholder="اسم الأنثى">
    <label><input type="checkbox" value="Ob" class="femaleGene"> أورنج بريست</label>
    <label><input type="checkbox" value="Bb" class="femaleGene"> بلاك بريست</label>
    <label><input type="checkbox" value="Bf" class="femaleGene"> بلاك فيس</label>
  </div>

  <div class="card">
    <button class="btn" onclick="calculate()">احسب التزاوج</button>
    <div id="summary"></div>
  </div>

  <div id="results"></div>

</div>

</div>

<script>

function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p=>{
    p.classList.remove('active');
  });
  document.getElementById(id).classList.add('active');

  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function getGenes(cls){
  return [...document.querySelectorAll('.'+cls+':checked')].map(e=>e.value);
}

function calculate(){
  const male = getGenes('maleGene');
  const female = getGenes('femaleGene');

  const all = [...new Set([...male, ...female])];

  let results = [];

  all.forEach(g=>{
    if(male.includes(g) && female.includes(g)){
      results.push({name:g, prob:50});
    }else{
      results.push({name:"حامل "+g, prob:50});
    }
  });

  document.getElementById('summary').innerHTML =
    "تم الحساب ✔️";

  document.getElementById('results').innerHTML =
    results.map(r=>`
      <div class="result-card">
        <b>${r.name}</b><br>
        النسبة: ${r.prob}%
      </div>
    `).join('');
}

</script>

</body>
</html>
